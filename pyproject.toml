[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "synarius-studio"
version = "0.1.11"
description = "PySide6 GUI for Synarius."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "Synarius Contributors" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: Mozilla Public License 2.0 (MPL 2.0)",
]
dependencies = [
  "PySide6>=6.0.0",
  "platformdirs>=4.0.0",
  # Core re-exports synarius_core.io (timeseries); that optional extra pulls numpy/pandas/pyarrow/asammdf.
  "synarius-core[timeseries] @ git+https://github.com/synarius-project/synarius-core.git@946bc4b8498d1299a0ce5539e63b160878fcd7c7",
]

[project.scripts]
run-synarius-studio = "synarius_studio.__main__:main"

[project.urls]
Homepage = "https://example.invalid/synarius-studio"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["synarius_studio*"]

[tool.setuptools.package-data]
synarius_studio = ["resources/*.syn", "diagram/svg/*.svg", "icons/*"]

# Local monorepo: synarius-core lives next to synarius-studio. Pylance/Pyright need this
# to resolve `synarius_core.*` when the sibling package is not installed in the venv.
[tool.pyright]
extraPaths = ["../synarius-core/src"]

[project.optional-dependencies]
dev = []
docs = [
  "sphinx",
  "sphinx-needs",
  "zerovm-sphinx-theme",
]

