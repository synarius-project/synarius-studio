name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  QT_QPA_PLATFORM: offscreen

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Qt / EGL libs (PySide6 on headless Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - run: pip install --upgrade pip
      - run: pip install . ruff pytest
      - run: ruff check .
      - run: |
          set +e
          pytest
          code=$?
          if [ $code -eq 5 ]; then exit 0; fi
          exit $code
