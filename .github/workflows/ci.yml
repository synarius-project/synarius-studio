name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - run: pip install ruff pytest
      - run: ruff check .
      - run: |
          set +e
          pytest
          code=$?
          if [ $code -eq 5 ]; then exit 0; fi
          exit $code
