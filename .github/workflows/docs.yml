name: Docs

on:
  push:
    branches: [dev]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Resolve studio root and clone siblings
        id: resolve
        run: |
          set -euo pipefail
          if [ -f "${GITHUB_WORKSPACE}/pyproject.toml" ]; then
            STUDIO_ROOT="${GITHUB_WORKSPACE}"
          elif [ -f "${GITHUB_WORKSPACE}/synarius-studio/pyproject.toml" ]; then
            STUDIO_ROOT="${GITHUB_WORKSPACE}/synarius-studio"
          else
            echo "::error::synarius-studio pyproject.toml not under ${GITHUB_WORKSPACE}"
            ls -la "${GITHUB_WORKSPACE}" || true
            exit 1
          fi
          echo "studio_root=${STUDIO_ROOT}" >> "${GITHUB_OUTPUT}"
          if [ "${STUDIO_ROOT}" = "${GITHUB_WORKSPACE}" ]; then
            PREFIX=""
          else
            PREFIX="${STUDIO_ROOT#${GITHUB_WORKSPACE}/}"
          fi
          if [ -z "${PREFIX}" ]; then
            echo "docs_artifact_rel=docs/_build/html" >> "${GITHUB_OUTPUT}"
          else
            echo "docs_artifact_rel=${PREFIX}/docs/_build/html" >> "${GITHUB_OUTPUT}"
          fi
          PARENT="$(dirname "${STUDIO_ROOT}")"
          cd "${PARENT}"
          git clone --depth 1 https://github.com/synarius-project/synarius-apps.git synarius-apps
          git clone --depth 1 https://github.com/synarius-project/synarius-core.git synarius-core
          # #region agent log
          echo "{\"sessionId\":\"3f66e7\",\"hypothesisId\":\"H5\",\"message\":\"resolve+clone\",\"data\":{\"studio_root\":\"${STUDIO_ROOT}\",\"parent\":\"${PARENT}\",\"prefix\":\"${PREFIX}\"}}"
          # #endregion
      - name: Install PlantUML and Qt / EGL libs (Sphinx + PySide6 headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            plantuml \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: "Check monorepo sibling paths (file: deps)"
        run: |
          set -euo pipefail
          STUDIO_ROOT='${{ steps.resolve.outputs.studio_root }}'
          STUDIO_ROOT="${STUDIO_ROOT//$'\r'/}"
          PARENT="$(dirname "$STUDIO_ROOT")"
          echo "STUDIO_ROOT=$STUDIO_ROOT"
          echo "PARENT=$PARENT"
          ls -la "$PARENT" || true
          if [ ! -f "$STUDIO_ROOT/pyproject.toml" ]; then
            echo "::error::Missing synarius-studio pyproject: $STUDIO_ROOT/pyproject.toml"
            ls -la "$STUDIO_ROOT" || true
            exit 1
          fi
          for name in synarius-apps synarius-core; do
            f="$PARENT/$name/pyproject.toml"
            if [ ! -f "$f" ]; then
              echo "::error::Missing $f (needed for file:../$name). Contents of $PARENT/$name:"
              ls -la "$PARENT/$name" 2>/dev/null || echo "(no dir)"
              exit 1
            fi
          done
          # #region agent log
          echo "{\"sessionId\":\"3f66e7\",\"hypothesisId\":\"H6\",\"message\":\"sibling-paths-ok\",\"data\":{\"STUDIO_ROOT\":\"$STUDIO_ROOT\",\"PARENT\":\"$PARENT\"}}"
          # #endregion
      - name: "pip install -e synarius-studio"
        run: |
          set -euo pipefail
          STUDIO_ROOT='${{ steps.resolve.outputs.studio_root }}'
          STUDIO_ROOT="${STUDIO_ROOT//$'\r'/}"
          python -m pip install --upgrade pip
          if ! python -m pip install -e "$STUDIO_ROOT"; then
            echo "::group::pip install -e failed (verbose log)"
            python -m pip install -e "$STUDIO_ROOT" -vvv 2>&1 | tail -n 400
            echo "::endgroup::"
            exit 1
          fi
      - run: pip install sphinx sphinx-needs zerovm-sphinx-theme sphinxcontrib-plantuml
      - run: sphinx-build -b html docs docs/_build/html
        working-directory: ${{ steps.resolve.outputs.studio_root }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.resolve.outputs.docs_artifact_rel }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
