name: Docs

on:
  push:
    branches: [dev]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # checkout puts the repo in $GITHUB_WORKSPACE/synarius-studio/
        working-directory: synarius-studio
    steps:
      - uses: actions/checkout@v5
      - name: "Clone sibling repos (pyproject.toml file: dependencies)"
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth 1 https://github.com/synarius-project/synarius-apps.git synarius-apps
          git clone --depth 1 https://github.com/synarius-project/synarius-core.git synarius-core
      - name: Install PlantUML (Sphinx PlantUML diagrams)
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: pip install sphinx sphinx-needs zerovm-sphinx-theme sphinxcontrib-plantuml
      - run: sphinx-build -b html docs docs/_build/html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: synarius-studio/docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

