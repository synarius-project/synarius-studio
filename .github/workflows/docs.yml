name: Docs

on:
  push:
    branches: [dev]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # #region agent log
      - name: Debug layout (session 3f66e7)
        run: |
          echo "{\"sessionId\":\"3f66e7\",\"hypothesisId\":\"H2\",\"message\":\"post-checkout\",\"data\":{\"GITHUB_WORKSPACE\":\"$GITHUB_WORKSPACE\",\"pwd\":\"$(pwd)\",\"pyproject_at_root\":\"$([ -f \"$GITHUB_WORKSPACE/pyproject.toml\" ] && echo yes || echo no)\",\"nested_studio_dir\":\"$([ -d \"$GITHUB_WORKSPACE/synarius-studio\" ] && echo yes || echo no)\"}}"
      # #endregion
      - name: "Clone sibling repos (pyproject.toml file: dependencies)"
        run: |
          parent="$(dirname "$GITHUB_WORKSPACE")"
          cd "$parent"
          git clone --depth 1 https://github.com/synarius-project/synarius-apps.git synarius-apps
          git clone --depth 1 https://github.com/synarius-project/synarius-core.git synarius-core
      - name: Install PlantUML (Sphinx PlantUML diagrams)
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: pip install sphinx sphinx-needs zerovm-sphinx-theme sphinxcontrib-plantuml
      - run: sphinx-build -b html docs docs/_build/html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

