name: PyInstaller Smoke

on:
  pull_request:
  workflow_dispatch:

env:
  PYINSTALLER_VERSION: "6.19.0"
  SYNARIUS_SIBLING_BRANCH: dev

jobs:
  windows-onedir-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Resolve studio root and clone siblings
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${GITHUB_WORKSPACE}/pyproject.toml" ]; then
            STUDIO_ROOT="${GITHUB_WORKSPACE}"
          elif [ -f "${GITHUB_WORKSPACE}/synarius-studio/pyproject.toml" ]; then
            STUDIO_ROOT="${GITHUB_WORKSPACE}/synarius-studio"
          else
            echo "::error::synarius-studio pyproject.toml not under ${GITHUB_WORKSPACE}"
            ls -la "${GITHUB_WORKSPACE}" || true
            exit 1
          fi
          echo "studio_root=${STUDIO_ROOT}" >> "${GITHUB_OUTPUT}"
          if [ "${STUDIO_ROOT}" = "${GITHUB_WORKSPACE}" ]; then
            echo "artifact_prefix=" >> "${GITHUB_OUTPUT}"
            echo "pyinstaller_onedir_glob=dist/synarius-studio/**" >> "${GITHUB_OUTPUT}"
          else
            PREFIX="${STUDIO_ROOT#${GITHUB_WORKSPACE}/}"
            echo "artifact_prefix=${PREFIX}/" >> "${GITHUB_OUTPUT}"
            echo "pyinstaller_onedir_glob=${PREFIX}/dist/synarius-studio/**" >> "${GITHUB_OUTPUT}"
          fi
          PARENT="$(dirname "${STUDIO_ROOT}")"
          cd "${PARENT}"
          git clone --depth 1 -b "${SYNARIUS_SIBLING_BRANCH}" https://github.com/synarius-project/synarius-apps.git synarius-apps
          git clone --depth 1 -b "${SYNARIUS_SIBLING_BRANCH}" https://github.com/synarius-project/synarius-core.git synarius-core
          # #region agent log
          echo "{\"sessionId\":\"3f66e7\",\"hypothesisId\":\"H4\",\"message\":\"pyinstaller resolve+clone\",\"data\":{\"studio_root\":\"${STUDIO_ROOT}\",\"parent\":\"${PARENT}\"}}"
          # #endregion
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Studio and PyInstaller
        shell: bash
        working-directory: ${{ steps.resolve.outputs.studio_root }}
        env:
          PYINSTALLER_VERSION: ${{ env.PYINSTALLER_VERSION }}
        run: |
          set -euo pipefail
          STUDIO_ROOT="$(pwd)"
          PARENT="$(dirname "${STUDIO_ROOT}")"
          export PYINSTALLER_VERSION="${PYINSTALLER_VERSION:-6.19.0}"
          python -m pip install --upgrade pip setuptools wheel
          if [ ! -d "${PARENT}/synarius-core" ] || [ ! -d "${PARENT}/synarius-apps" ]; then
            echo "::error::Expected synarius-core and synarius-apps next to studio root: ${PARENT}"
            ls -la "${PARENT}" || true
            exit 1
          fi
          ( cd "${PARENT}/synarius-core" && python -m pip install ".[timeseries,fmu]" )
          ( cd "${PARENT}/synarius-apps" && python -m pip install . )
          ( cd "${STUDIO_ROOT}" && python -m pip install --no-deps . )
          python -m pip install "pyinstaller==${PYINSTALLER_VERSION}"
          python -m pip install "PySide6>=6.0.0" "platformdirs>=4.0.0" "duckdb>=1.5.1" "immutables>=0.20"
      - run: python -m pip install "git+https://github.com/synarius-project/synarius-apps.git" --no-deps
        shell: bash
        working-directory: ${{ steps.resolve.outputs.studio_root }}
      - name: Build onedir bundle
        run: python -m PyInstaller --noconfirm --clean synarius_studio_onedir.spec
        shell: bash
        working-directory: ${{ steps.resolve.outputs.studio_root }}
      - name: Smoke test onedir startup
        shell: powershell
        working-directory: ${{ steps.resolve.outputs.studio_root }}
        run: |
          $env:SYNARIUS_STUDIO_SMOKE_EXIT = "1"
          & "dist\synarius-studio\synarius-studio.exe" --smoke-exit
          if ($LASTEXITCODE -ne 0) {
            throw "Onedir smoke test failed with exit code $LASTEXITCODE"
          }
      - name: Upload onedir bundle
        uses: actions/upload-artifact@v5
        with:
          name: pyinstaller-onedir
          path: ${{ steps.resolve.outputs.pyinstaller_onedir_glob }}
      - name: Upload PyInstaller diagnostics
        uses: actions/upload-artifact@v5
        with:
          name: pyinstaller-diagnostics-smoke
          path: |
            ${{ steps.resolve.outputs.artifact_prefix }}build/**/warn-*.txt
            ${{ steps.resolve.outputs.artifact_prefix }}build/**/xref-*.html
          if-no-files-found: warn
