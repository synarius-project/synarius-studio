name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist-python
          path: dist/*

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install . pyinstaller
      - run: pyinstaller --noconfirm --clean --onefile --windowed --name synarius-studio src/synarius_studio/__main__.py
      - run: choco install wixtoolset -y
      - name: Build MSI with WiX
        shell: powershell
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected tag format vX.Y.Z, got: $tag"
          }
          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag must match vX.Y.Z for WiX MSI versioning. Got: $tag"
          }
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product Id="*" Name="synarius-studio" Language="1033" Version="$version" Manufacturer="Synarius Contributors" UpgradeCode="D43DD59A-0E89-4A83-AF7A-861F0E5C8427">
              <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" />
              <MediaTemplate EmbedCab="yes" />
              <Feature Id="MainFeature" Title="synarius-studio" Level="1">
                <ComponentRef Id="MainExeComponent" />
              </Feature>
            </Product>
            <Fragment>
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="ProgramFilesFolder">
                  <Directory Id="INSTALLFOLDER" Name="synarius-studio">
                    <Component Id="MainExeComponent" Guid="*">
                      <File Id="MainExeFile" Source="dist\synarius-studio.exe" KeyPath="yes" />
                    </Component>
                  </Directory>
                </Directory>
              </Directory>
            </Fragment>
          </Wix>
          "@ | Out-File -Encoding UTF8 installer.wxs
          candle.exe installer.wxs
          light.exe installer.wixobj -o dist\synarius-studio-installer.msi
      - uses: actions/upload-artifact@v5
        with:
          name: dist-windows-installer
          path: dist/synarius-studio-installer.msi

  release-assets:
    runs-on: ubuntu-latest
    needs: [build, windows-installer]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/dist-windows-installer/synarius-studio-installer.msi
