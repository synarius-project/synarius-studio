name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist-python
          path: dist/*

  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install . pyinstaller
      - run: pyinstaller --noconfirm --clean --onefile --windowed --name synarius-studio src/synarius_studio/__main__.py
      - run: Compress-Archive -Path dist/synarius-studio.exe -DestinationPath dist/synarius-studio-windows.zip -Force
      - uses: actions/upload-artifact@v5
        with:
          name: dist-windows-exe
          path: |
            dist/synarius-studio.exe
            dist/synarius-studio-windows.zip

  release-assets:
    runs-on: ubuntu-latest
    needs: [build, windows-exe]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
