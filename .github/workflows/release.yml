name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYINSTALLER_VERSION: "6.19.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist-python
          path: dist/*

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set app version from release tag
        shell: powershell
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected tag format vX.Y.Z, got: $tag"
          }
          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag must match vX.Y.Z. Got: $tag"
          }
          "__version__ = `"$version`"" | Out-File -Encoding utf8 src/synarius_studio/_version.py
      - run: pip install . "pyinstaller==${{ env.PYINSTALLER_VERSION }}"
      # FMU runtime in packaged app requires fmpy at bundle time; ensure it is present in CI env.
      - run: pip install fmpy
      # Live DataViewer / recording viewer: same packages as monorepo ``synarius-apps`` (no core override).
      - run: pip install "git+https://github.com/synarius-project/synarius-apps.git" --no-deps
      - name: PyInstaller (one-file, Qt plugins + package data)
        run: pyinstaller --noconfirm --clean synarius_studio.spec
      - name: Smoke test bundled EXE startup
        shell: powershell
        run: |
          $env:SYNARIUS_STUDIO_SMOKE_EXIT = "1"
          $proc = Start-Process -FilePath "dist\synarius-studio.exe" -ArgumentList "--smoke-exit" -PassThru -Wait
          if ($null -eq $proc.ExitCode) {
            throw "Smoke test failed: process exit code is null."
          }
          if ($proc.ExitCode -ne 0) {
            throw "Smoke test failed with exit code $($proc.ExitCode)"
          }
      - name: Collect runtime log from smoke run
        shell: powershell
        run: |
          $src = Join-Path $env:LOCALAPPDATA "Synarius\SynariusStudio\Logs\synarius-studio.log"
          $dstDir = Join-Path $env:RUNNER_TEMP "synarius-smoke-logs"
          New-Item -ItemType Directory -Force -Path $dstDir | Out-Null
          if (Test-Path $src) {
            Copy-Item $src (Join-Path $dstDir "synarius-studio.log") -Force
          } else {
            Write-Host "Runtime smoke log not found at $src"
          }
      - name: Upload runtime smoke log
        uses: actions/upload-artifact@v5
        with:
          name: runtime-smoke-log
          path: ${{ runner.temp }}/synarius-smoke-logs/**
          if-no-files-found: warn
      - name: Upload PyInstaller diagnostics
        uses: actions/upload-artifact@v5
        with:
          name: pyinstaller-diagnostics
          path: |
            build/**/warn-*.txt
            build/**/xref-*.html
            ${{ runner.temp }}/synarius-smoke-logs/**
          if-no-files-found: warn
      - run: choco install wixtoolset -y
      - name: Build MSI with WiX
        shell: powershell
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected tag format vX.Y.Z, got: $tag"
          }
          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag must match vX.Y.Z for WiX MSI versioning. Got: $tag"
          }
          if (-not (Test-Path "DISCLAIMER.txt")) {
            throw "DISCLAIMER.txt not found in repository root."
          }
          $disclaimerText = Get-Content -Raw "DISCLAIMER.txt"
          $escapedText = $disclaimerText.Replace('\', '\\').Replace('{', '\{').Replace('}', '\}').Replace("`r`n", '\par ').Replace("`n", '\par ')
          "{\rtf1\ansi\deff0 {\fonttbl {\f0 Arial;}}\f0\fs20 $escapedText}" | Out-File -Encoding ascii disclaimer.rtf
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product Id="*" Name="synarius-studio" Language="1033" Version="$version" Manufacturer="Synarius Contributors" UpgradeCode="D43DD59A-0E89-4A83-AF7A-861F0E5C8427">
              <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" />
              <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." AllowSameVersionUpgrades="no" />
              <MediaTemplate EmbedCab="yes" />
              <WixVariable Id="WixUILicenseRtf" Value="disclaimer.rtf" />
              <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />
              <Property Id="WIXUI_EXITDIALOGOPTIONALCHECKBOXTEXT" Value="Launch synarius-studio" />
              <Property Id="WixShellExecTarget" Value="[#MainExeFile]" />
              <Feature Id="MainFeature" Title="synarius-studio" Level="1">
                <ComponentRef Id="MainExeComponent" />
                <ComponentRef Id="BundledExampleModellingComponent" />
                <ComponentRef Id="BundledExampleExperimentComponent" />
                <ComponentRef Id="BundledExampleFmuComponent" />
                <ComponentRef Id="BundledBouncingBallFmuComponent" />
                <ComponentRef Id="BundledBouncingBallLicenseComponent" />
                <ComponentRef Id="BundledBouncingBallNoticesComponent" />
                <ComponentRef Id="StartMenuShortcutComponent" />
              </Feature>
              <UIRef Id="WixUI_InstallDir" />
              <UIRef Id="WixUI_ErrorProgressText" />
              <CustomAction Id="LaunchApplication"
                            BinaryKey="WixCA"
                            DllEntry="WixShellExec"
                            Impersonate="yes" />
              <UI>
                <Publish Dialog="ExitDialog"
                         Control="Finish"
                         Event="DoAction"
                         Value="LaunchApplication">WIXUI_EXITDIALOGOPTIONALCHECKBOX = 1 AND NOT Installed</Publish>
              </UI>
            </Product>
            <Fragment>
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="ProgramFilesFolder">
                  <Directory Id="INSTALLFOLDER" Name="synarius-studio">
                    <Component Id="MainExeComponent" Guid="*">
                      <File Id="MainExeFile" Source="dist\synarius-studio.exe" KeyPath="yes" />
                    </Component>
                    <Component Id="BundledExampleModellingComponent" Guid="*">
                      <File Id="BundledExampleModellingSyn" Source="src\synarius_studio\resources\example_modelling.syn" KeyPath="yes" />
                    </Component>
                    <Component Id="BundledExampleExperimentComponent" Guid="*">
                      <File Id="BundledExampleExperimentSyn" Source="src\synarius_studio\resources\example_experiment.syn" />
                    </Component>
                    <Component Id="BundledExampleFmuComponent" Guid="*">
                      <File Id="BundledExampleFmuSyn" Source="src\synarius_studio\resources\example_fmu.syn" />
                    </Component>
                    <Directory Id="ThirdPartyDir" Name="third_party">
                      <Directory Id="BouncingBallDir" Name="bouncing_ball">
                        <Component Id="BundledBouncingBallFmuComponent" Guid="*">
                          <File Id="BundledBouncingBallFmu" Source="src\synarius_studio\resources\third_party\bouncing_ball\BouncingBall.fmu" KeyPath="yes" />
                        </Component>
                        <Component Id="BundledBouncingBallLicenseComponent" Guid="*">
                          <File Id="BundledBouncingBallLicense" Source="src\synarius_studio\resources\third_party\bouncing_ball\LICENSE_BouncingBall.txt" />
                        </Component>
                        <Component Id="BundledBouncingBallNoticesComponent" Guid="*">
                          <File Id="BundledBouncingBallNotices" Source="src\synarius_studio\resources\third_party\bouncing_ball\THIRD_PARTY_NOTICES.md" />
                        </Component>
                      </Directory>
                    </Directory>
                  </Directory>
                </Directory>
                <Directory Id="ProgramMenuFolder">
                  <Directory Id="ApplicationProgramsFolder" Name="synarius-studio" />
                </Directory>
              </Directory>
            </Fragment>
            <Fragment>
              <DirectoryRef Id="ApplicationProgramsFolder">
                <Component Id="StartMenuShortcutComponent" Guid="*">
                  <Shortcut Id="ApplicationStartMenuShortcut"
                            Name="synarius-studio"
                            Description="Start synarius-studio"
                            Target="[INSTALLFOLDER]synarius-studio.exe"
                            WorkingDirectory="INSTALLFOLDER"
                            Icon="StudioAppIcon" />
                  <RemoveFolder Id="ApplicationProgramsFolderRemove" On="uninstall" />
                  <RegistryValue Root="HKCU"
                                 Key="Software\Synarius\synarius-studio"
                                 Name="StartMenuShortcut"
                                 Type="integer"
                                 Value="1"
                                 KeyPath="yes" />
                </Component>
              </DirectoryRef>
            </Fragment>
            <Fragment>
              <Icon Id="StudioAppIcon" SourceFile="dist\synarius-studio.exe" />
            </Fragment>
          </Wix>
          "@ | Out-File -Encoding UTF8 installer.wxs
          candle.exe installer.wxs
          light.exe installer.wixobj -ext WixUIExtension -ext WixUtilExtension -o dist\synarius-studio-installer.msi
      - name: Validate MSI if wix CLI available
        shell: powershell
        run: |
          if (Get-Command wix -ErrorAction SilentlyContinue) {
            wix msi validate "dist\synarius-studio-installer.msi"
          } else {
            Write-Host "wix CLI not available on runner; skipping wix msi validate."
          }
      - uses: actions/upload-artifact@v5
        with:
          name: dist-windows-installer
          path: dist/synarius-studio-installer.msi

  release-assets:
    runs-on: ubuntu-latest
    needs: [build, windows-installer]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ startsWith(github.ref_name, 'v0.0.') }}
          generate_release_notes: true
          files: release-assets/dist-windows-installer/synarius-studio-installer.msi
