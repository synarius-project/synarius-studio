name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYINSTALLER_VERSION: "6.19.0"
  # Sibling repos (file:../ in pyproject): use the same branch Studio development uses so
  # tagged releases do not silently build against stale default-branch checkouts of core/apps.
  SYNARIUS_SIBLING_BRANCH: dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Resolve studio root and clone siblings
        id: resolve
        run: |
          set -euo pipefail
          if [ -f "${GITHUB_WORKSPACE}/pyproject.toml" ]; then
            STUDIO_ROOT="${GITHUB_WORKSPACE}"
          elif [ -f "${GITHUB_WORKSPACE}/synarius-studio/pyproject.toml" ]; then
            STUDIO_ROOT="${GITHUB_WORKSPACE}/synarius-studio"
          else
            echo "::error::synarius-studio pyproject.toml not under ${GITHUB_WORKSPACE}"
            ls -la "${GITHUB_WORKSPACE}" || true
            exit 1
          fi
          echo "studio_root=${STUDIO_ROOT}" >> "${GITHUB_OUTPUT}"
          if [ "${STUDIO_ROOT}" = "${GITHUB_WORKSPACE}" ]; then
            echo "dist_artifact_glob=dist/*" >> "${GITHUB_OUTPUT}"
          else
            echo "dist_artifact_glob=${STUDIO_ROOT#${GITHUB_WORKSPACE}/}/dist/*" >> "${GITHUB_OUTPUT}"
          fi
          PARENT="$(dirname "${STUDIO_ROOT}")"
          cd "${PARENT}"
          git clone --depth 1 -b "${SYNARIUS_SIBLING_BRANCH}" https://github.com/synarius-project/synarius-apps.git synarius-apps
          git clone --depth 1 -b "${SYNARIUS_SIBLING_BRANCH}" https://github.com/synarius-project/synarius-core.git synarius-core
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build
        working-directory: ${{ steps.resolve.outputs.studio_root }}
      - run: python -m build
        working-directory: ${{ steps.resolve.outputs.studio_root }}
      - uses: actions/upload-artifact@v5
        with:
          name: dist-python
          path: ${{ steps.resolve.outputs.dist_artifact_glob }}

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Resolve studio root and clone siblings
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${GITHUB_WORKSPACE}/pyproject.toml" ]; then
            STUDIO_ROOT="${GITHUB_WORKSPACE}"
          elif [ -f "${GITHUB_WORKSPACE}/synarius-studio/pyproject.toml" ]; then
            STUDIO_ROOT="${GITHUB_WORKSPACE}/synarius-studio"
          else
            echo "::error::synarius-studio pyproject.toml not under ${GITHUB_WORKSPACE}"
            ls -la "${GITHUB_WORKSPACE}" || true
            exit 1
          fi
          echo "studio_root=${STUDIO_ROOT}" >> "${GITHUB_OUTPUT}"
          if [ "${STUDIO_ROOT}" = "${GITHUB_WORKSPACE}" ]; then
            PREFIX=""
            echo "msi_glob=dist/Synarius_Installer_*.msi" >> "${GITHUB_OUTPUT}"
            echo "artifact_prefix=" >> "${GITHUB_OUTPUT}"
          else
            PREFIX="${STUDIO_ROOT#${GITHUB_WORKSPACE}/}"
            echo "msi_glob=${PREFIX}/dist/Synarius_Installer_*.msi" >> "${GITHUB_OUTPUT}"
            echo "artifact_prefix=${PREFIX}/" >> "${GITHUB_OUTPUT}"
          fi
          PARENT="$(dirname "${STUDIO_ROOT}")"
          cd "${PARENT}"
          git clone --depth 1 -b "${SYNARIUS_SIBLING_BRANCH}" https://github.com/synarius-project/synarius-apps.git synarius-apps
          git clone --depth 1 -b "${SYNARIUS_SIBLING_BRANCH}" https://github.com/synarius-project/synarius-core.git synarius-core
          # #region agent log
          echo "{\"sessionId\":\"3f66e7\",\"hypothesisId\":\"H4\",\"message\":\"windows resolve+clone\",\"data\":{\"studio_root\":\"${STUDIO_ROOT}\",\"parent\":\"${PARENT}\",\"prefix\":\"${PREFIX}\"}}"
          # #endregion
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set app version from release tag
        shell: powershell
        working-directory: ${{ steps.resolve.outputs.studio_root }}
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected tag format vX.Y.Z, got: $tag"
          }
          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag must match vX.Y.Z. Got: $tag"
          }
          "__version__ = `"$version`"" | Out-File -Encoding utf8 src/synarius_studio/_version.py
      # Bash (not PowerShell): reliable resolution of ``file:../…`` path deps on Windows runners.
      # Pre-install siblings so pip does not mis-resolve monorepo-relative PEP 508 paths.
      - name: Install Studio and PyInstaller
        shell: bash
        working-directory: ${{ steps.resolve.outputs.studio_root }}
        env:
          PYINSTALLER_VERSION: ${{ env.PYINSTALLER_VERSION }}
        run: |
          set -euo pipefail
          STUDIO_ROOT="$(pwd)"
          PARENT="$(dirname "${STUDIO_ROOT}")"
          export PYINSTALLER_VERSION="${PYINSTALLER_VERSION:-6.19.0}"
          python -m pip install --upgrade pip setuptools wheel
          if [ ! -d "${PARENT}/synarius-core" ] || [ ! -d "${PARENT}/synarius-apps" ]; then
            echo "::error::Expected synarius-core and synarius-apps next to studio root: ${PARENT}"
            ls -la "${PARENT}" || true
            exit 1
          fi
          # Install from inside each repo so extras ``.[timeseries,fmu]`` are not parsed as a path/glob
          # segment on Windows/Git-Bash (``…/synarius-core[timeseries,fmu]`` breaks pip).
          ( cd "${PARENT}/synarius-core" && python -m pip install ".[timeseries,fmu]" )
          ( cd "${PARENT}/synarius-apps" && python -m pip install . )
          # ``pip install .`` would re-resolve ``file:../…`` deps from pyproject.toml; that fails on many
          # Windows runners even when siblings are already installed. Install Studio without deps, then
          # add the remaining PyPI-only requirements (must stay aligned with ``pyproject.toml``).
          ( cd "${STUDIO_ROOT}" && python -m pip install --no-deps . )
          python -m pip install "pyinstaller==${PYINSTALLER_VERSION}"
          python -m pip install "PySide6>=6.0.0" "platformdirs>=4.0.0" "duckdb>=1.5.1" "immutables>=0.20"
      # FMU runtime in packaged app requires fmpy at bundle time; ensure it is present in CI env.
      - run: python -m pip install fmpy
        shell: bash
        working-directory: ${{ steps.resolve.outputs.studio_root }}
      # Live DataViewer / recording viewer: same packages as monorepo ``synarius-apps`` (no core override).
      - run: python -m pip install "git+https://github.com/synarius-project/synarius-apps.git" --no-deps
        shell: bash
        working-directory: ${{ steps.resolve.outputs.studio_root }}
      - name: PyInstaller (one-file, Qt plugins + package data)
        # ``pyinstaller`` is not always on PATH in Git-Bash on Windows; ``python -m PyInstaller`` is reliable.
        run: python -m PyInstaller --noconfirm --clean synarius_studio.spec
        shell: bash
        working-directory: ${{ steps.resolve.outputs.studio_root }}
      - name: Smoke test bundled EXE startup
        shell: powershell
        working-directory: ${{ steps.resolve.outputs.studio_root }}
        run: |
          $env:SYNARIUS_STUDIO_SMOKE_EXIT = "1"
          $proc = Start-Process -FilePath "dist\synarius-studio.exe" -ArgumentList "--smoke-exit" -PassThru -Wait
          if ($null -eq $proc.ExitCode) {
            throw "Smoke test failed: process exit code is null."
          }
          if ($proc.ExitCode -ne 0) {
            throw "Smoke test failed with exit code $($proc.ExitCode)"
          }
      - name: Collect runtime log from smoke run
        shell: powershell
        working-directory: ${{ steps.resolve.outputs.studio_root }}
        run: |
          $src = Join-Path $env:LOCALAPPDATA "Synarius\SynariusStudio\Logs\synarius-studio.log"
          $dstDir = Join-Path $env:RUNNER_TEMP "synarius-smoke-logs"
          New-Item -ItemType Directory -Force -Path $dstDir | Out-Null
          if (Test-Path $src) {
            Copy-Item $src (Join-Path $dstDir "synarius-studio.log") -Force
          } else {
            Write-Host "Runtime smoke log not found at $src"
          }
      - name: Upload runtime smoke log
        uses: actions/upload-artifact@v5
        with:
          name: runtime-smoke-log
          path: ${{ runner.temp }}/synarius-smoke-logs/**
          if-no-files-found: warn
      - name: Upload PyInstaller diagnostics
        uses: actions/upload-artifact@v5
        with:
          name: pyinstaller-diagnostics
          path: |
            ${{ steps.resolve.outputs.artifact_prefix }}build/**/warn-*.txt
            ${{ steps.resolve.outputs.artifact_prefix }}build/**/xref-*.html
            ${{ runner.temp }}/synarius-smoke-logs/**
          if-no-files-found: warn
      - run: choco install wixtoolset -y
      - name: Build MSI with WiX
        shell: powershell
        working-directory: ${{ steps.resolve.outputs.studio_root }}
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected tag format vX.Y.Z, got: $tag"
          }
          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag must match vX.Y.Z for WiX MSI versioning. Got: $tag"
          }
          $msiPath = Join-Path "dist" "Synarius_Installer_$version.msi"
          if (-not (Test-Path "DISCLAIMER.txt")) {
            throw "DISCLAIMER.txt not found in repository root."
          }
          $disclaimerText = Get-Content -Raw "DISCLAIMER.txt"
          $escapedText = $disclaimerText.Replace('\', '\\').Replace('{', '\{').Replace('}', '\}').Replace("`r`n", '\par ').Replace("`n", '\par ')
          "{\rtf1\ansi\deff0 {\fonttbl {\f0 Arial;}}\f0\fs20 $escapedText}" | Out-File -Encoding ascii disclaimer.rtf
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product Id="*" Name="synarius-studio" Language="1033" Version="$version" Manufacturer="Synarius Contributors" UpgradeCode="D43DD59A-0E89-4A83-AF7A-861F0E5C8427">
              <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" />
              <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." AllowSameVersionUpgrades="no" />
              <MediaTemplate EmbedCab="yes" />
              <WixVariable Id="WixUILicenseRtf" Value="disclaimer.rtf" />
              <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />
              <Property Id="WIXUI_EXITDIALOGOPTIONALCHECKBOXTEXT" Value="Launch synarius-studio" />
              <Property Id="WixShellExecTarget" Value="[#MainExeFile]" />
              <Feature Id="MainFeature" Title="synarius-studio" Level="1">
                <ComponentRef Id="MainExeComponent" />
                <ComponentRef Id="BundledExampleModellingComponent" />
                <ComponentRef Id="BundledExampleExperimentComponent" />
                <ComponentRef Id="BundledExampleFmuComponent" />
                <ComponentRef Id="BundledExampleLibVsCanvasAddComponent" />
                <ComponentRef Id="BundledExampleMapsCurvesComponent" />
                <ComponentRef Id="BundledKenngroessenNullenComponent" />
                <ComponentRef Id="BundledKenngroessenPoly3Component" />
                <ComponentRef Id="BundledMeasurementComponent" />
                <ComponentRef Id="BundledMeasurement1Component" />
                <ComponentRef Id="BundledMeasurement6Component" />
                <ComponentRef Id="BundledBouncingBallFmuComponent" />
                <ComponentRef Id="BundledBouncingBallLicenseComponent" />
                <ComponentRef Id="BundledBouncingBallNoticesComponent" />
                <ComponentRef Id="StartMenuShortcutComponent" />
              </Feature>
              <UIRef Id="WixUI_InstallDir" />
              <UIRef Id="WixUI_ErrorProgressText" />
              <CustomAction Id="LaunchApplication"
                            BinaryKey="WixCA"
                            DllEntry="WixShellExec"
                            Impersonate="yes" />
              <UI>
                <Publish Dialog="ExitDialog"
                         Control="Finish"
                         Event="DoAction"
                         Value="LaunchApplication">WIXUI_EXITDIALOGOPTIONALCHECKBOX = 1 AND NOT Installed</Publish>
              </UI>
            </Product>
            <Fragment>
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="ProgramFilesFolder">
                  <Directory Id="INSTALLFOLDER" Name="synarius-studio">
                    <Component Id="MainExeComponent" Guid="*">
                      <File Id="MainExeFile" Source="dist\synarius-studio.exe" KeyPath="yes" />
                    </Component>
                    <Component Id="BundledExampleModellingComponent" Guid="*">
                      <File Id="BundledExampleModellingSyn" Source="src\synarius_studio\resources\example_modelling.syn" KeyPath="yes" />
                    </Component>
                    <Component Id="BundledExampleExperimentComponent" Guid="*">
                      <File Id="BundledExampleExperimentSyn" Source="src\synarius_studio\resources\example_experiment.syn" />
                    </Component>
                    <Component Id="BundledExampleFmuComponent" Guid="*">
                      <File Id="BundledExampleFmuSyn" Source="src\synarius_studio\resources\example_fmu.syn" />
                    </Component>
                    <Component Id="BundledExampleLibVsCanvasAddComponent" Guid="*">
                      <File Id="BundledExampleLibVsCanvasAddSyn" Source="src\synarius_studio\resources\example_lib_vs_canvas_add.syn" />
                    </Component>
                    <Component Id="BundledExampleMapsCurvesComponent" Guid="*">
                      <File Id="BundledExampleMapsCurvesSyn" Source="src\synarius_studio\resources\example_maps_curves.syn" />
                    </Component>
                    <Component Id="BundledKenngroessenNullenComponent" Guid="*">
                      <File Id="BundledKenngroessenNullenDcm" Source="src\synarius_studio\resources\kenngroessen_nullen.dcm" KeyPath="yes" />
                    </Component>
                    <Component Id="BundledKenngroessenPoly3Component" Guid="*">
                      <File Id="BundledKenngroessenPoly3Dcm" Source="src\synarius_studio\resources\kenngroessen_poly3.dcm" KeyPath="yes" />
                    </Component>
                    <Component Id="BundledMeasurementComponent" Guid="*">
                      <File Id="BundledMeasurementMf4" Source="src\synarius_studio\resources\measurement.mf4" KeyPath="yes" />
                    </Component>
                    <Component Id="BundledMeasurement1Component" Guid="*">
                      <File Id="BundledMeasurement1Mf4" Source="src\synarius_studio\resources\measurement_1.mf4" KeyPath="yes" />
                    </Component>
                    <Component Id="BundledMeasurement6Component" Guid="*">
                      <File Id="BundledMeasurement6Mf4" Source="src\synarius_studio\resources\measurement_6.mf4" KeyPath="yes" />
                    </Component>
                    <Directory Id="ThirdPartyDir" Name="third_party">
                      <Directory Id="BouncingBallDir" Name="bouncing_ball">
                        <Component Id="BundledBouncingBallFmuComponent" Guid="*">
                          <File Id="BundledBouncingBallFmu" Source="src\synarius_studio\resources\third_party\bouncing_ball\BouncingBall.fmu" KeyPath="yes" />
                        </Component>
                        <Component Id="BundledBouncingBallLicenseComponent" Guid="*">
                          <File Id="BundledBouncingBallLicense" Source="src\synarius_studio\resources\third_party\bouncing_ball\LICENSE_BouncingBall.txt" />
                        </Component>
                        <Component Id="BundledBouncingBallNoticesComponent" Guid="*">
                          <File Id="BundledBouncingBallNotices" Source="src\synarius_studio\resources\third_party\bouncing_ball\THIRD_PARTY_NOTICES.md" />
                        </Component>
                      </Directory>
                    </Directory>
                  </Directory>
                </Directory>
                <Directory Id="ProgramMenuFolder">
                  <Directory Id="ApplicationProgramsFolder" Name="synarius-studio" />
                </Directory>
              </Directory>
            </Fragment>
            <Fragment>
              <DirectoryRef Id="ApplicationProgramsFolder">
                <Component Id="StartMenuShortcutComponent" Guid="*">
                  <Shortcut Id="ApplicationStartMenuShortcut"
                            Name="synarius-studio"
                            Description="Start synarius-studio"
                            Target="[INSTALLFOLDER]synarius-studio.exe"
                            WorkingDirectory="INSTALLFOLDER"
                            Icon="StudioAppIcon" />
                  <RemoveFolder Id="ApplicationProgramsFolderRemove" On="uninstall" />
                  <RegistryValue Root="HKCU"
                                 Key="Software\Synarius\synarius-studio"
                                 Name="StartMenuShortcut"
                                 Type="integer"
                                 Value="1"
                                 KeyPath="yes" />
                </Component>
              </DirectoryRef>
            </Fragment>
            <Fragment>
              <Icon Id="StudioAppIcon" SourceFile="dist\synarius-studio.exe" />
            </Fragment>
          </Wix>
          "@ | Out-File -Encoding UTF8 installer.wxs
          candle.exe installer.wxs
          light.exe installer.wixobj -ext WixUIExtension -ext WixUtilExtension -o $msiPath
      - name: Validate MSI if wix CLI available
        shell: powershell
        working-directory: ${{ steps.resolve.outputs.studio_root }}
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $version = $tag.Substring(1)
          $msiPath = Join-Path "dist" "Synarius_Installer_$version.msi"
          if (Get-Command wix -ErrorAction SilentlyContinue) {
            wix msi validate $msiPath
          } else {
            Write-Host "wix CLI not available on runner; skipping wix msi validate."
          }
      - uses: actions/upload-artifact@v5
        with:
          name: dist-windows-installer
          path: ${{ steps.resolve.outputs.msi_glob }}

  release-assets:
    runs-on: ubuntu-latest
    needs: [build, windows-installer]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ startsWith(github.ref_name, 'v0.0.') }}
          generate_release_notes: true
          files: release-assets/**/Synarius_Installer_*.msi
